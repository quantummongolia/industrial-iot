<!DOCTYPE html>
<html lang="mn" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="description" content="MRESOURCE Industrial IoT Platform - Real-time monitoring system">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MRESOURCE">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="img/industrial-iot-icon.png">
  <link rel="apple-touch-icon" href="img/industrial-iot-icon.png">
  <title>MRESOURCE</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0c;
      color: #f5f5f7;
      font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }


    .top-label {
      width: 100%;
      text-align: center;
      padding: 36px 24px 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2997ff;
    }


    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 24px;
      gap: 0;
    }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .hero-title {
      font-size: clamp(52px, 12vw, 88px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.0;
      text-align: center;
      margin-bottom: 10px;
      background-image: linear-gradient(110deg, #5bb8f5, #a855c8, #d4417e, #e8602a, #5bb8f5) !important;
      background-size: 200% 100% !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      color: transparent !important;
      animation: gradientFlow 4s linear infinite !important;
    }

    .hero-sub {
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 400;
      color: #2997ff;
      text-align: center;
      letter-spacing: 0.01em;
      margin-bottom: 48px;
    }


    .login-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .field-group {
      border-bottom: 1px solid rgba(255,255,255,0.12);
      position: relative;
    }
    .field-group:first-child {
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.03em;
      padding: 14px 0 0;
    }

    .field-input {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #f5f5f7;
      font-family: inherit;
      font-size: 16px;
      font-weight: 400;
      padding: 6px 0 14px;
      caret-color: #f5f5f7;
    }
    .field-input::placeholder { color: rgba(255,255,255,0.2); }

    .pw-wrap { position: relative; }
    .pw-wrap .field-input { padding-right: 36px; }
    .pw-toggle {
      position: absolute;
      right: 0;
      bottom: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: rgba(255,255,255,0.7); }
    .pw-toggle .eye-off { display: none; }
    .pw-revealed .eye-off { display: block; }
    .pw-revealed .eye-on { display: none; }

    .forgot-link {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      text-decoration: none;
      padding: 10px 0 0;
      display: inline-block;
      transition: color 0.15s;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .forgot-link:hover { color: rgba(255,255,255,0.5); }

    .login-error {
      font-size: 12px;
      color: #ff453a;
      min-height: 16px;
      padding-top: 4px;
    }

    .btn-signin {
      width: 100%;
      margin-top: 32px;
      background: #f5f5f7;
      color: #0a0a0c;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-signin:hover { opacity: 0.88; }
    .btn-signin:active { transform: scale(0.99); }
    .btn-signin:disabled { opacity: 0.3; cursor: not-allowed; }


    .marquee-section {
      width: 100%;
      margin-top: 28px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    }
    .marquee-wrap {
      position: relative;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 12% 88%, transparent 100%);
      mask-image: linear-gradient(90deg, transparent 0%, #000 12% 88%, transparent 100%);
    }
    .marquee-track {
      display: flex;
      flex-wrap: nowrap;
      gap: 36px;
      width: max-content;
    }
    .marquee-inner {
      display: flex;
      align-items: center;
      gap: 36px;
      width: max-content;
      flex-shrink: 0;
    }
    .tech-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      opacity: 0.5;
      cursor: default;
      user-select: none;
      transition: opacity 0.2s;
    }
    .tech-badge:hover { opacity: 0.85; }
    .tech-badge svg { width: 16px; height: 16px; flex-shrink: 0; }
    .tech-badge span { font-size: 12px; font-weight: 500; color: #f5f5f7; }
  </style>
</head>

              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="button" class="forgot-link">Forgot Password?</button>
      <div class="login-error" id="loginError1"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var inner = document.getElementById('marqueeInner');
      if (!inner) return;
      var track = inner.parentNode;
      var clone = inner.cloneNode(true);
      clone.setAttribute('aria-hidden', 'true');
      track.appendChild(clone);
      var SPEED = 0.4, x = 0, paused = false;
      var wrap = track.parentNode;
      function step() {
        if (!paused) {
          x -= SPEED;
          var itemW = inner.offsetWidth + 36;
          if (Math.abs(x) >= itemW) x = 0;
          track.style.transform = 'translateX(' + x + 'px)';
        }
        requestAnimationFrame(step);
      }
      wrap.addEventListener('mouseenter', function () { paused = true; });
      wrap.addEventListener('mouseleave', function () { paused = false; });
      requestAnimationFrame(step);
    });

    function togglePassword() {
      var wrap = document.getElementById('passwordWrap');
      var inp = document.getElementById('passwordInput');
      var revealed = wrap.classList.toggle('pw-revealed');
      inp.type = revealed ? 'text' : 'password';
    }

    function initDecryptedText() {
      var el = document.getElementById('decryptLogo');
      if (!el) return;
      var text = el.textContent.trim();
      var CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%^&*()_+';
      var SPEED = 60;
      el.innerHTML = text.split('').map(function (ch) {
        return '<span data-ch="' + ch + '">' + ch + '</span>';
      }).join('');
      var spans = Array.from(el.querySelectorAll('span'));
      var intervalId = null;
      var rand = function () { return CHARS[Math.floor(Math.random() * CHARS.length)]; };
      var decrypt = function () {
        if (intervalId) clearInterval(intervalId);
        spans.forEach(function (s) { if (s.dataset.ch !== ' ') s.textContent = rand(); });
        var pointer = 0;
        intervalId = setInterval(function () {
          if (pointer >= spans.length) { clearInterval(intervalId); return; }
          spans[pointer].textContent = spans[pointer].dataset.ch;
          pointer++;
          for (var i = pointer; i < spans.length; i++) {
            if (spans[i].dataset.ch !== ' ') spans[i].textContent = rand();
          }
        }, SPEED);
      };
      var observer = new IntersectionObserver(function (entries) {
        if (entries[0].isIntersecting) { decrypt(); observer.disconnect(); }
      }, { threshold: 0.1 });
      observer.observe(el);
      el.addEventListener('mouseenter', decrypt);
    }

    document.addEventListener('DOMContentLoaded', function () {
      initDecryptedText();
      if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length) {
        firebase.auth().onAuthStateChanged(function (user) {
          if (user) location.replace('index.html');
        });
      }
      if (typeof setupLoginForm === 'function') setupLoginForm();
    });
  </script>
