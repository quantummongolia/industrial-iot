name: OTA bootstrap industrialMachine (one-shot)

# Нэг удаагийн туслах: butluur firmware суусан НӨӨЦ board-руу industrialMachine-ийн
# release bin-ийг OTA-аар (butluur-н /commands stream-ээр) дарж бичнэ.
# RTDB-д бичих эрхийг repo-н FIREBASE_RTDB_SECRET-ээс авна.
#
# Хэрэглээ (Actions → энэ workflow → Run workflow):
#   device_id хоосон  → online butluur_* төхөөрөмжүүдийг жагсаана; ганц л байвал
#                        автоматаар тэр рүү push хийнэ, олон бол зогсоно.
#   device_id өгвөл   → яг тэр төхөөрөмж рүү push хийнэ.

on:
  workflow_dispatch:
    inputs:
      device_id:
        description: 'Target butluur deviceId (хоосон бол auto: online ганц butluur_*)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
      RTDB_SECRET: ${{ secrets.FIREBASE_RTDB_SECRET }}
      INPUT_DEVICE: ${{ github.event.inputs.device_id }}
    steps:
      - name: Resolve release (url/sha256/version)
        id: rel
        run: |
          set -euo pipefail
          REL=$(curl -sf "${FIREBASE_DB_URL}/firmware/industrialMachine/latest.json?auth=${RTDB_SECRET}")
          if [ -z "$REL" ] || [ "$REL" = "null" ]; then
            echo "::error::/firmware/industrialMachine/latest олдсонгүй — CI release дутуу"
            exit 1
          fi
          URL=$(echo "$REL" | jq -r '.url')
          SHA=$(echo "$REL" | jq -r '.sha256')
          VER=$(echo "$REL" | jq -r '.version')
          if [ -z "$URL" ] || [ "${#SHA}" -ne 64 ]; then
            echo "::error::release metadata буруу (url/sha256)"
            exit 1
          fi
          echo "url=$URL"  >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"  >> "$GITHUB_OUTPUT"
          echo "ver=$VER"  >> "$GITHUB_OUTPUT"
          echo "Release v$VER → $URL"

      - name: Pick target butluur device
        id: pick
        run: |
          set -euo pipefail
          if [ -n "${INPUT_DEVICE}" ]; then
            echo "Гар сонголт: ${INPUT_DEVICE}"
            echo "target=${INPUT_DEVICE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEVS=$(curl -sf "${FIREBASE_DB_URL}/devices.json?auth=${RTDB_SECRET}")
          NOW_MS=$(date +%s%3N)
          # 3 минутын дотор heartbeat ирсэн butluur_* төхөөрөмжүүд (online)
          ONLINE=$(echo "$DEVS" | jq -r --argjson now "$NOW_MS" '
            to_entries
            | map(select(.key|startswith("butluur_")))
            | map(select((.value.last_heartbeat // 0) > ($now - 180000)))
            | .[].key')

          echo "Online butluur_* төхөөрөмжүүд:"
          echo "$DEVS" | jq -r --argjson now "$NOW_MS" '
            to_entries
            | map(select(.key|startswith("butluur_")))
            | .[] | "  \(.key)  fw=\(.value.firmware)  ip=\(.value.ip)  age_s=\((($now - (.value.last_heartbeat // 0))/1000)|floor)"'

          CNT=$(echo "$ONLINE" | grep -c . || true)
          if [ "$CNT" -eq 0 ]; then
            echo "::error::Online butluur_* алга — нөөц board-оо асаасан эсэхээ шалга"
            exit 1
          fi
          if [ "$CNT" -gt 1 ]; then
            echo "::error::Олон ($CNT) online butluur_* байна — device_id-г гараар зааж дахин ажиллуул:"
            echo "$ONLINE"
            exit 1
          fi
          TARGET=$(echo "$ONLINE" | head -1)
          echo "Auto target: $TARGET"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Push OTA update command
        run: |
          set -euo pipefail
          TARGET="${{ steps.pick.outputs.target }}"
          URL="${{ steps.rel.outputs.url }}"
          SHA="${{ steps.rel.outputs.sha }}"
          VER="${{ steps.rel.outputs.ver }}"
          CMD_ID="cmd_$(date +%s)_imboot"
          NOW_S=$(date +%s)

          PAYLOAD=$(jq -nc \
            --arg id "$CMD_ID" --arg url "$URL" --arg sha "$SHA" \
            --arg ver "$VER" --argjson ts "$NOW_S" '{
              id: $id, action: "update", url: $url, sha256: $sha,
              version: $ver, issued_by: "gh-actions-bootstrap", issued_at: $ts
            }')

          curl -sf -X PUT \
            "${FIREBASE_DB_URL}/commands/${TARGET}/pending.json?auth=${RTDB_SECRET}" \
            -H "Content-Type: application/json" -d "$PAYLOAD" >/dev/null
          echo "✅ OTA команд илгээв → ${TARGET} (industrialMachine v${VER})"
          echo "Дараа нь /devices/${TARGET}/ota_status дотор stage харагдана."
