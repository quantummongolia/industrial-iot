; ESP32 industrialMachine — PlatformIO тохиргоо
; Board: ESP32-S3 N8R2 DevKit — 8MB flash, 2MB PSRAM
;
; Зорилго: USB HOST болж бусад ESP (S3-Zero / WROOM / S3 N8R8 / N8R2)-г USB-C-ээр
;   залгахад тэдгээрийн serial гаралтыг уншиж 0.92" I2C OLED (SSD1306, 0x3C) дээр
;   realtime хэвлэнэ. Залгаагүй үед "NOT CONNECTED" гаргана. WiFi-руу автоматаар
;   холбогдож OTA шинэчлэлт хүлээж авна.

[env:esp32-s3-n8r2]
; pioarduino — Arduino-ESP32 v3.x-г дэмждэг community platform.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.31/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3 N8R2 — 8MB flash. butluur-тай ижил 8MB OTA partition.
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB

; Compile-ийн өмнө git tag-аас FIRMWARE_VERSION гаргаж BUILD_FLAGS-д нэмнэ
extra_scripts = pre:version_script.py

build_flags =
    ; Native USB-г HOST болгож ашиглана → USB-CDC device-ийг АСÁАХГҮЙ.
    ; CDC_ON_BOOT=0 тул `Serial` нь UART0 (GPIO43/44) руу гарна — өөрийн debug лог
    ; тэндээс харагдана. Монитор хийж буй төхөөрөмжийн лог OLED дээр гарна.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; USBHostSerial RX/TX ring буфер
    -DUSBHOSTSERIAL_BUFFERSIZE=512
    ; Firebase сан — ашиглахгүй модулиудыг compile хийхгүй
    -DDISABLE_FIRESTORE
    -DDISABLE_FCM
    -DDISABLE_FB_STORAGE
    -DDISABLE_GC_STORAGE
    -DDISABLE_FB_FUNCTIONS
    -DDISABLE_OTA
    ; N8R2 — 2MB PSRAM (Quad SPI)
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Bootloader rollback — шинэ firmware self-test амжилтгүй болвол өмнөх app-руу автомат буцна
    -DCONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=1

monitor_speed = 115200

lib_deps =
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.17
    bblanchon/ArduinoJson@^7.0.4
    ; USB HOST serial — CDC-ACM + CP210x + CH34x + FTDI бүгдийг дэмжинэ
    ; (S3 native = CDC-ACM, WROOM devkit = CP2102/CH340)
    https://github.com/bertmelis/USBHostSerial.git
    ; 0.92" SSD1306 I2C OLED — монитор хийж буй serial-ийг харуулна
    olikraus/U8g2@^2.35.19

upload_speed = 921600
