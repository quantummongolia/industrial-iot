; ESP32 Hothon — PlatformIO тохиргоо
; Board: ESP32-WROOM-32 (classic, 4MB flash, PSRAM-гүй)

[env:esp32-wroom]
; pioarduino — Arduino-ESP32 v3.x-г дэмждэг community platform.
; Албан ёсны platformio/espressif32 v2.0.17-д тогтсон тул шинэ WDT API ажиллахгүй.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.31/platform-espressif32.zip
board = esp32dev
framework = arduino

; ESP32-WROOM-32 — 4MB flash, төрөлх USB байхгүй (serial нь UART0 / USB-bridge дээр)
; OTA-д зориулсан 2 app slot бүхий custom partition (partitions.csv)
board_build.flash_size = 4MB
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB

; Compile-ийн өмнө git tag-аас FIRMWARE_VERSION гаргаж BUILD_FLAGS-д нэмнэ
extra_scripts = pre:version_script.py

build_flags =
    ; Firebase сан — ашиглахгүй модулиудыг compile хийхгүй
    -DDISABLE_FIRESTORE
    -DDISABLE_FCM
    -DDISABLE_FB_STORAGE
    -DDISABLE_GC_STORAGE
    -DDISABLE_FB_FUNCTIONS
    -DDISABLE_OTA
    ; OTA-г GitHub releases-ээс ESP32-ийн HTTPUpdate-аар хийнэ —
    ; Firebase сангийн OTA модуль шаардлагагүй
    ; Bootloader rollback — шинэ firmware self-test амжилтгүй болвол өмнөх app-руу автомат буцна
    -DCONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=1

monitor_speed = 115200

lib_deps =
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.17
    bblanchon/ArduinoJson@^7.0.4

upload_speed = 921600
